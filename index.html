<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blob — Speak</title>
  <style>
    :root {
      --bg: #1a1423;
      --blob: #f6b4c3;
      --blob-dark: #e89aab;
      --accent: #7dd3c0;
      --text: #f4eef8;
      --muted: #9a8fb0;
      --panel: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #2d2640 0%, var(--bg) 55%);
      color: var(--text);
      padding: 1.5rem;
    }

    h1 {
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin: 0 0 1.25rem;
    }

    .stage {
      animation: idle-float 4.2s ease-in-out infinite;
      transform-origin: 50% 60%;
      margin-bottom: 1.75rem;
    }

    @keyframes idle-float {
      0%, 100% { transform: translateY(0) rotate(-0.5deg); }
      50% { transform: translateY(-10px) rotate(0.6deg); }
    }

    .blob-wrap {
      width: min(280px, 85vw);
      aspect-ratio: 1;
      filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.35));
    }

    .blob-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .mouth-group path {
      opacity: 0;
      transition: opacity 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mouth-group[data-frame="0"] .mouth-neutral { opacity: 1; }
    .mouth-group[data-frame="1"] .mouth-open { opacity: 1; }
    .mouth-group[data-frame="2"] .mouth-smile { opacity: 1; }

    /* Slightly quicker crossfade while “talking” so open ↔ smile reads clearly */
    .mouth-group.speaking path {
      transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .controls {
      width: min(400px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      backdrop-filter: blur(10px);
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      padding: 0.65rem 0.75rem;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }

    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 0.65rem;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    select {
      flex: 1;
      min-width: 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      padding: 0.5rem 0.6rem;
      font-size: 0.85rem;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 0.55rem 1.15rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #5bc4af);
      color: #0d1f1a;
      box-shadow: 0 4px 14px rgba(125, 211, 192, 0.35);
    }

    button:hover {
      filter: brightness(1.05);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: none;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .toggle input {
      accent-color: var(--accent);
      width: 1rem;
      height: 1rem;
    }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
      line-height: 1.4;
    }

    .hint.warn {
      color: #f0a8a8;
    }
  </style>
</head>
<body>
  <h1>Blob</h1>

  <div class="stage" aria-hidden="true">
    <div class="blob-wrap">
      <svg class="blob-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="blobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:var(--blob)" />
            <stop offset="100%" style="stop-color:var(--blob-dark)" />
          </linearGradient>
        </defs>
        <path
          fill="url(#blobGrad)"
          d="M100 22
             C 152 22 188 58 188 108
             C 188 158 148 188 100 188
             C 52 188 12 158 12 108
             C 12 58 48 22 100 22 Z"
        />
        <g class="eye" transform="translate(76, 98)">
          <ellipse cx="0" cy="0" rx="13" ry="17" fill="#2a2438" />
          <ellipse cx="3" cy="-5" rx="4" ry="5" fill="#fff" opacity="0.92" />
        </g>
        <g class="eye" transform="translate(124, 98)">
          <ellipse cx="0" cy="0" rx="13" ry="17" fill="#2a2438" />
          <ellipse cx="3" cy="-5" rx="4" ry="5" fill="#fff" opacity="0.92" />
        </g>
        <g class="mouth-group" data-frame="0" transform="translate(100, 132)">
          <g class="mouth-motion">
            <path class="mouth-neutral" fill="none" stroke="#4a3d5c" stroke-width="3" stroke-linecap="round"
              d="M-16 0 Q0 9 16 0" />
            <path class="mouth-open" fill="#4a3d5c" d="M-12 -2 Q0 20 12 -2 Q0 7 -12 -2" />
            <path class="mouth-smile" fill="none" stroke="#4a3d5c" stroke-width="3" stroke-linecap="round"
              d="M-20 0 Q0 16 20 0" />
          </g>
        </g>
      </svg>
    </div>
  </div>

  <div class="controls">
    <label for="text">What should I say?</label>
    <textarea id="text" placeholder="Type something sweet…">Hello! I am a soft little blob.</textarea>

    <div class="row">
      <label class="toggle">
        <input type="checkbox" id="repeatMode" />
        Repeat after me
      </label>
    </div>

    <div class="row">
      <label for="voice" style="flex:1 0 100%; margin:0">Voice</label>
      <select id="voice" aria-label="Voice"></select>
    </div>

    <div class="row">
      <button type="button" id="speakBtn">Speak</button>
      <button type="button" id="listenBtn" disabled style="background:linear-gradient(135deg,#b8a9e0,#8b7bc4);color:#1a1423;box-shadow:0 4px 14px rgba(184,169,224,0.3)">Listen</button>
    </div>

    <p class="hint" id="hint">Uses your browser’s speech synthesis. “Repeat after me” needs microphone access and a browser that supports speech recognition (Chrome / Edge work well).</p>
  </div>

  <script>
    (function () {
      const textEl = document.getElementById("text");
      const voiceEl = document.getElementById("voice");
      const speakBtn = document.getElementById("speakBtn");
      const listenBtn = document.getElementById("listenBtn");
      const repeatMode = document.getElementById("repeatMode");
      const mouth = document.querySelector(".mouth-group");
      const mouthMotion = mouth.querySelector(".mouth-motion");
      const hint = document.getElementById("hint");

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      let listening = false;

      function setMouthFrame(n) {
        mouth.setAttribute("data-frame", String(n));
      }

      function fillVoices() {
        const voices = speechSynthesis.getVoices();
        const current = voiceEl.value;
        voiceEl.innerHTML = "";
        const frag = document.createDocumentFragment();
        voices.forEach((v, i) => {
          const opt = document.createElement("option");
          opt.value = String(i);
          opt.textContent = v.name + (v.lang ? " (" + v.lang + ")" : "");
          frag.appendChild(opt);
        });
        voiceEl.appendChild(frag);
        if (current && voiceEl.querySelector('option[value="' + current + '"]')) {
          voiceEl.value = current;
        }
      }

      speechSynthesis.onvoiceschanged = fillVoices;
      fillVoices();
      setTimeout(fillVoices, 300);

      function getSelectedVoice() {
        const voices = speechSynthesis.getVoices();
        const idx = parseInt(voiceEl.value, 10);
        if (!isNaN(idx) && voices[idx]) return voices[idx];
        return voices[0] || null;
      }

      let mouthAnimRaf = null;
      let mouthAnimActive = false;
      let mouthAnimStart = 0;
      let lastTalkFrame = 1;

      function clearMouthJiggle() {
        mouthAnimActive = false;
        if (mouthAnimRaf != null) {
          cancelAnimationFrame(mouthAnimRaf);
          mouthAnimRaf = null;
        }
        mouthMotion.removeAttribute("transform");
        mouth.classList.remove("speaking");
        lastTalkFrame = 1;
      }

      function mouthAnimStep(ts) {
        if (!mouthAnimActive) return;
        const elapsed = (ts - mouthAnimStart) / 1000;
        const pivotY = 11;
        const squash = 0.82 + Math.sin(elapsed * 14) * 0.28;
        mouthMotion.setAttribute(
          "transform",
          "translate(0," + pivotY + ") scale(1," + squash + ") translate(0,-" + pivotY + ")"
        );
        const frame = Math.floor(elapsed * 4) % 2 === 0 ? 1 : 2;
        if (frame !== lastTalkFrame) {
          lastTalkFrame = frame;
          setMouthFrame(frame);
        }
        mouthAnimRaf = requestAnimationFrame(mouthAnimStep);
      }

      /** Open / smile crossfade + continuous squash via SVG transform (rAF) */
      function startMouthJiggle() {
        clearMouthJiggle();
        mouthAnimActive = true;
        mouthAnimStart = performance.now();
        mouth.classList.add("speaking");
        setMouthFrame(1);
        lastTalkFrame = 1;
        mouthAnimRaf = requestAnimationFrame(mouthAnimStep);
      }

      function speakFromText(text, onEnd) {
        const t = (text || "").trim();
        if (!t) {
          clearMouthJiggle();
          setMouthFrame(0);
          if (onEnd) onEnd();
          return;
        }
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        const v = getSelectedVoice();
        if (v) u.voice = v;
        u.rate = 1;
        u.pitch = 1.05;

        u.onstart = function () {
          startMouthJiggle();
        };
        u.onend = function () {
          clearMouthJiggle();
          setMouthFrame(0);
          if (onEnd) onEnd();
        };
        u.onerror = function () {
          clearMouthJiggle();
          setMouthFrame(0);
          if (onEnd) onEnd();
        };

        speechSynthesis.speak(u);
      }

      speakBtn.addEventListener("click", function () {
        speakFromText(textEl.value, null);
      });

      function setupRecognition() {
        if (!SpeechRecognition) {
          repeatMode.disabled = true;
          listenBtn.disabled = true;
          hint.textContent = "Speech recognition is not available in this browser. Speaking still works.";
          hint.classList.add("warn");
          return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = document.documentElement.lang || "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        recognition.onstart = function () {
          listening = true;
          listenBtn.textContent = "Listening…";
          listenBtn.disabled = false;
          startMouthJiggle();
        };

        recognition.onend = function () {
          listening = false;
          listenBtn.textContent = "Listen";
          listenBtn.disabled = !repeatMode.checked;
          clearMouthJiggle();
          setMouthFrame(0);
        };

        recognition.onerror = function () {
          listening = false;
          listenBtn.textContent = "Listen";
          clearMouthJiggle();
          setMouthFrame(0);
        };

        recognition.onresult = function (ev) {
          const said = ev.results[0][0].transcript.trim();
          if (!said) return;
          textEl.value = said;
          speakFromText(said, function () {
            if (repeatMode.checked) {
              window.setTimeout(function () {
                try {
                  recognition.start();
                } catch (e) {}
              }, 280);
            }
          });
        };

        repeatMode.addEventListener("change", function () {
          listenBtn.disabled = !repeatMode.checked;
          if (!repeatMode.checked && listening) {
            try {
              recognition.stop();
            } catch (e) {}
          }
        });

        listenBtn.addEventListener("click", function () {
          if (!repeatMode.checked) return;
          if (listening) {
            try {
              recognition.stop();
            } catch (e) {}
            return;
          }
          speechSynthesis.cancel();
          try {
            recognition.start();
          } catch (e) {
            hint.textContent = "Could not start listening. Try again or check mic permission.";
            hint.classList.add("warn");
          }
        });
      }

      setupRecognition();
      setMouthFrame(0);
    })();
  </script>
</body>
</html>
